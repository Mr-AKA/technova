<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECHNOVA</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link href="templatemo-electric-xtra.css" rel="stylesheet" />
    <!--

TemplateMo 596 Electric Xtra

https://templatemo.com/tm-596-electric-xtra

-->
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      /* HERO */

      .prod-hero {
        background: url("https://images.unsplash.com/photo-1517336714731-489689fd1ca8")
          center/cover no-repeat;
        color: white;
        display: flex;
        align-items: center;
        text-align: center;
      }

      .hero-overlay {
        background: rgba(0, 0, 0, 0.6);
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
      }

      /* PRODUCT CARD */

      .product-card {
        transition: 0.3s;
      }

      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .product-card img {
        height: 200px;
        object-fit: contain;
        padding: 15px;
      }

      /* FILTER BUTTON */

      .filter-btn {
        margin: 5px;
      }
    </style>
  </head>

  <body>
    <!-- Animated Grid Background -->
    <div class="grid-bg"></div>
    <div class="gradient-overlay"></div>
    <div class="scanlines"></div>

    <!-- Animated Shapes -->
    <div class="shapes-container">
      <div class="shape shape-circle"></div>
      <div class="shape shape-triangle"></div>
      <div class="shape shape-square"></div>
    </div>

    <!-- Floating Particles -->
    <div id="particles"></div>

    <!-- Navigation -->
    <nav id="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo-link">
          <img
            src="/images/TECHNOVA LOGO.png"
            style="height: 60px; margin-left: 10px"
          />
        </a>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html" class="nav-link rounded">Home</a></li>
          <li><a href="products.html" class="nav-links active rounded">Products</a></li>
          <li><a href="aboutus.html" class="nav-link rounded">About Us</a></li>
          <li><a href="contactus" class="nav-link rounded">Contact us</a></li>
        </ul>
        <div class="menu-toggle" id="menuToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="prod-hero" id="home">
      <div class="hero-overlay">
        <div class="hero-content mb-0">
          <div class="text-rotator">
            <div class="text-set active">
              <h1 class="glitch-text" data-text="FUTURE">Products</h1>
            </div>
          </div>
        </div>

        <div class="cta-container">
          <a href="#features" class="cta-button cta-primary rounded"
            >Get Started</a
          >
          <a href="#about" class="cta-button cta-secondary rounded"
            >Learn More</a
          >
        </div>
      </div>
    </section>

    <!-- FILTER -->

    <section class="py-4 text-center">
      <div class="container">
        <h3 class="mb-3">Browse Categories</h3>

        <button
          class="btn btn-primary filter-btn"
          onclick="filterProducts('all')"
        >
          All
        </button>

        <button
          class="btn btn-outline-primary filter-btn"
          onclick="filterProducts('charger')"
        >
          Chargers
        </button>

        <button
          class="btn btn-outline-primary filter-btn"
          onclick="filterProducts('audio')"
        >
          Audio
        </button>

        <button
          class="btn btn-outline-primary filter-btn"
          onclick="filterProducts('phone')"
        >
          Phone Cases
        </button>

        <button
          class="btn btn-outline-primary filter-btn"
          onclick="filterProducts('laptop')"
        >
          Laptop
        </button>

        <button
          class="btn btn-outline-primary filter-btn"
          onclick="filterProducts('storage')"
        >
          Storage
        </button>
      </div>
    </section>

    <!-- PRODUCTS -->

    <section class="pb-5">
      <div class="container">
        <div class="row g-4" id="product-list">
          <!-- PRODUCT -->

          <div class="col-lg-3 col-md-4 col-6 product charger">
            <div class="card product-card">
              <img
                src="/images/accessories/4b00d3e3c0e326fb6feff3a94f5e039f.png"
                class="card-img-top"
              />

              
            </div>
          </div>

          <!-- PRODUCT -->

          <div class="col-lg-3 col-md-4 col-6 product audio">
            <div class="card product-card">
              <img
                src="/images/accessories/9403ca0abafe98be7764051353a99641.png"
              />

              
            </div>
          </div>

          <!-- PRODUCT -->

          <div class="col-lg-3 col-md-4 col-6 product laptop">
            <div class="card product-card">
              <img
                src="/images/laptop/10029.png"
              />

             
            </div>
          </div>

          <!-- PRODUCT -->

          <div class="col-lg-3 col-md-4 col-6 product phone">
            <div class="card product-card">
              <img
                src="/images/phone/44e72acf34884d19c9b65496d1c1922a.png"
              />

              
            </div>
          </div>

          <!-- PRODUCT -->

          <div class="col-lg-3 col-md-4 col-6 product storage">
            <div class="card product-card">
              <img
                src="/images/accessories/e3df63930c041e121eeea9e7db733243.png"
              />

              
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER -->

    <footer class="bg-dark text-white text-center p-4">
      <p>© 2026 TECHNOVA Electronics</p>
    </footer>
 <script src="templatemo-electric-scripts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function filterProducts(category) {
        let products = document.querySelectorAll(".product");

        products.forEach(function (item) {
          if (category === "all") {
            item.style.display = "block";
          } else if (item.classList.contains(category)) {
            item.style.display = "block";
          } else {
            item.style.display = "none";
          }
        });
      }
    </script>
  </body>
</html>
