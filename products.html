    <script>
      function filterProducts(category) {
        let products = document.querySelectorAll(".product");

        products.forEach(function (item) {
          if (category === "all") {
            item.style.display = "block";
          } else if (item.classList.contains(category)) {
            item.style.display = "block";
          } else {
            item.style.display = "none";
          }
        });
      }
    </script>
